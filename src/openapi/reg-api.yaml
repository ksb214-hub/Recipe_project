openapi: 3.0.3
info:
  title: Reg API
  version: 1.0.0
servers:
  - url: http://localhost:8081   # 백엔드 URL
paths:
  /ingredients:
    get:
      summary: 모든 재료 조회
      tags:
        - Ingredients
      responses:
        '200':
          description: 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
    post:
      summary: 재료 등록
      tags:
        - Ingredients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientInput'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
  /ingredients/{id}:
    put:
      summary: 재료 수정
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientInput'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
    delete:
      summary: 재료 삭제
      tags:
        - Ingredients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 삭제 성공

components:
  schemas:
    Ingredient:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        amount:
          type: string
        date:
          type: string
          format: date
    IngredientInput:
      type: object
      properties:
        name:
          type: string
        amount:
          type: string
        date:
          type: string
          format: date
      required:
        - name
        - amount
        - date